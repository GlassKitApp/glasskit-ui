name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # No version pin here — pnpm/action-setup reads the
      # `packageManager` field from the root package.json.
      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm turbo run lint

      - name: Typecheck
        run: pnpm turbo run typecheck

      - name: Test
        run: pnpm turbo run test

      - name: Build
        run: pnpm turbo run build

      # Meta's device budget: <500 KB gzipped JS, <10 requests on load.
      # Checks every /preview/<slug> glass app + the SDK dist.
      - name: Bundle budget
        run: node scripts/check-bundle-budget.mjs

  # Validates the publishable surface of every released package on every PR
  # and push: tarball contents, package.json/exports hygiene (publint), and —
  # for the SDK — type resolution from consumer perspectives (attw). Broken
  # exports fail the PR long before a release.
  package-checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build packages
        run: pnpm --filter @glasskit-ui/react --filter @glasskit-ui/cli --filter @glasskit-ui/mcp build

      - name: Verify tarball contents
        run: |
          check() {
            (cd "packages/$1" && npm pack --dry-run --json > /tmp/pack.json)
            node -e '
              const files = require("/tmp/pack.json")[0].files.map((f) => f.path);
              const required = process.argv.slice(1);
              const missing = required.filter((f) => !files.includes(f));
              if (missing.length) {
                console.error(process.env.PKG + " tarball missing: " + missing.join(", "));
                process.exit(1);
              }
              console.log(process.env.PKG + " tarball ok — " + files.length + " files");
            ' "${@:2}"
          }
          PKG=glasses-ui check glasses-ui \
            dist/index.js dist/index.d.ts \
            dist/hooks/index.js dist/hooks/index.d.ts \
            dist/primitives/index.js dist/primitives/index.d.ts \
            styles.css README.md LICENSE package.json
          PKG=cli check cli dist/index.js README.md LICENSE package.json
          PKG=mcp check mcp dist/index.js README.md LICENSE package.json
          PKG=create-glasskit check create-glasskit bin.mjs README.md LICENSE package.json

      - name: publint (all published packages)
        run: |
          for pkg in glasses-ui cli mcp create-glasskit; do
            (cd "packages/$pkg" && pnpm dlx publint --strict)
          done

      - name: Are the types wrong? (SDK)
        working-directory: packages/glasses-ui
        run: pnpm dlx @arethetypeswrong/cli --pack . --profile esm-only --exclude-entrypoints styles.css

      # The `init` scaffold must compile and fit the device budget: build a
      # real app from the template (SDK from the local tarball — it may not
      # be on npm yet) and gzip-measure the Vite output.
      - name: Scaffold compiles within budget
        run: |
          pnpm --filter @glasskit-ui/react exec pnpm pack --out /tmp/gk-sdk.tgz
          mkdir -p /tmp/scaffold
          node packages/cli/dist/index.js init app --cwd /tmp/scaffold --no-install
          cd /tmp/scaffold/app
          node -e '
            const fs = require("fs");
            const p = JSON.parse(fs.readFileSync("package.json", "utf8"));
            p.dependencies["@glasskit-ui/react"] = "file:/tmp/gk-sdk.tgz";
            fs.writeFileSync("package.json", JSON.stringify(p, null, 2));
          '
          npm install --no-audit --no-fund
          npm run build
          node -e '
            const fs = require("fs"), zlib = require("zlib"), path = require("path");
            let total = 0;
            for (const f of fs.readdirSync("dist/assets")) {
              if (!f.endsWith(".js")) continue;
              total += zlib.gzipSync(fs.readFileSync(path.join("dist/assets", f))).length;
            }
            const kb = total / 1024;
            console.log("scaffold app: " + kb.toFixed(1) + " KB gzipped JS (budget 500 KB)");
            if (kb > 500) { console.error("scaffold exceeds the device budget"); process.exit(1); }
          '

  # Releases can't silently skip: changes to the published package must carry
  # a changeset (or the PR must opt out with the `no-changeset-needed` label).
  changeset-guard:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Require a changeset for package changes
        env:
          BASE_REF: ${{ github.base_ref }}
          LABELS: ${{ join(github.event.pull_request.labels.*.name, ',') }}
        run: |
          if [[ ",$LABELS," == *",no-changeset-needed,"* ]]; then
            echo "Label no-changeset-needed set — skipping."
            exit 0
          fi
          changed=$(git diff --name-only "origin/$BASE_REF"...HEAD)
          pkg=$(echo "$changed" | grep -E '^packages/(glasses-ui|cli|mcp|create-glasskit)/(src/|bin\.mjs|styles\.css|package\.json)' | grep -v '\.test\.' || true)
          if [ -z "$pkg" ]; then
            echo "No publishable package changes — ok."
            exit 0
          fi
          if echo "$changed" | grep -qE '^\.changeset/.*\.md$'; then
            echo "Changeset present — ok."
            exit 0
          fi
          echo "::error::This PR changes a published package but has no changeset."
          echo "Run 'pnpm changeset' and commit the result, or add the"
          echo "'no-changeset-needed' label if this change should not release."
          exit 1
