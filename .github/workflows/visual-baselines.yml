name: Update Visual Baselines

# Regenerates the visual-regression screenshots ON CI (ubuntu) so baselines
# always match the platform that compares them — never update snapshots from
# a Mac. Dispatch it:
#   - on a feature branch: pushes the regenerated baselines to that branch
#   - on main: opens a PR with the changes (nothing lands on main directly)

on:
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

concurrency: visual-baselines-${{ github.ref }}

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm --filter @glasskit-ui/react build && pnpm --filter @glasskit-ui/web build

      - name: Install Playwright browser
        working-directory: apps/web
        run: pnpm exec playwright install --with-deps chromium

      - name: Regenerate baselines
        working-directory: apps/web
        run: pnpm exec playwright test --update-snapshots

      - name: Commit baselines
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add apps/web/e2e/__screenshots__
          if git diff --cached --quiet; then
            echo "Baselines unchanged — nothing to do."
            exit 0
          fi
          if [ "${GITHUB_REF_NAME}" = "main" ]; then
            BRANCH="chore/visual-baselines-${GITHUB_RUN_ID}"
            git checkout -b "$BRANCH"
            git commit -m "test: update visual baselines"
            git push origin "$BRANCH"
            curl -sS -X POST "https://api.github.com/repos/${GITHUB_REPOSITORY}/pulls" \
              -H "Authorization: Bearer ${GH_TOKEN}" \
              -H "Accept: application/vnd.github+json" \
              -d "{\"title\":\"test: update visual baselines\",\"head\":\"${BRANCH}\",\"base\":\"main\",\"body\":\"Regenerated on CI by the visual-baselines workflow (run ${GITHUB_RUN_ID}). Review the screenshot diffs, then merge.\"}"
          else
            git commit -m "test: update visual baselines"
            git push origin "HEAD:${GITHUB_REF_NAME}"
          fi
